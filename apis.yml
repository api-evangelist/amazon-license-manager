aid: amazon-license-manager
name: Amazon License Manager
description: >-
  AWS License Manager makes it easier to manage licenses in AWS and on-premises
  servers from software vendors such as Microsoft, SAP, Oracle, and IBM. It
  helps you control your licensing costs by letting you create rules that emulate
  the terms of your licensing agreements.
