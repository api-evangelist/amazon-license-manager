naftiko: 1.0.0-alpha2
info:
  label: Amazon License Manager Workflow
  description: Unified workflow capability for Amazon License Manager combining resource management and operations.
  tags:
  - Amazon License Manager
  - AWS
  - Workflow
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: license-manager
    baseUri: https://license-manager.us-east-1.amazonaws.com
    description: Amazon License Manager service.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: license-configurations
      path: /license-configurations
      description: License configuration management
      operations:
      - name: createlicenseconfiguration
        method: POST
        description: Creates a license configuration.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listlicenseconfigurations
        method: GET
        description: Lists the license configurations for your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getlicenseconfiguration
        method: GET
        description: Gets detailed information about the specified license configuration.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: license-manager-api
    description: REST API for Amazon License Manager workflow.
    resources: []
  - type: mcp
    port: 9090
    namespace: license-manager-mcp
    transport: http
    description: MCP server for Amazon License Manager.
    tools:
    - name: license-configurations-create-license-configuratio
      description: Creates a license configuration.
      hints:
        readOnly: false
        idempotent: false
      call: license-manager.createlicenseconfiguration
      outputParameters:
      - type: object
        mapping: $.
    - name: license-configurations-list-license-configurations
      description: Lists the license configurations for your account.
      hints:
        readOnly: true
        idempotent: true
      call: license-manager.listlicenseconfigurations
      outputParameters:
      - type: object
        mapping: $.
    - name: license-configurations-get-license-configuration
      description: Gets detailed information about the specified license configuration.
      hints:
        readOnly: true
        idempotent: true
      call: license-manager.getlicenseconfiguration
      outputParameters:
      - type: object
        mapping: $.
